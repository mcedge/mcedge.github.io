    /* 官方转圈动画定义 */
    .lds-ring {
      display: inline-block;
      position: relative;
      width: 1.875rem;
      height: 1.875rem
    }

    .lds-ring div {
      box-sizing: border-box;
      display: block;
      position: absolute;
      animation: lds-ring 1.2s cubic-bezier(.5, 0, .5, 1) infinite;
      border: .3rem solid;
      border-radius: 50%;
      border-color: #313131 rgba(0, 0, 0, 0) rgba(0, 0, 0, 0);
      width: 1.875rem;
      height: 1.875rem
    }

    /* 确保动画关键帧存在 */
    @keyframes lds-ring {
      0% {
        transform: rotate(0deg);
      }
      100% {
        transform: rotate(360deg);
      }
    }

    .lds-ring div:nth-child(1) {
      animation-delay: -0.45s;
    }

    .lds-ring div:nth-child(2) {
      animation-delay: -0.3s;
    }

    .lds-ring div:nth-child(3) {

    /* ========== 钓鱼组件样式（完全适配深色/浅色模式） ========== */
    .checkbox-window {
      width: 320px;
      height: 70px;
      background: #1e1e1e;
      border: 1px solid #3a3a3a;
      border-radius: 0;
      padding: 0 12px;
      display: none;
      align-items: center;
      justify-content: space-between;
      opacity: 0;
      transition: opacity 0.3s, background 0.2s, border-color 0.2s;
      box-sizing: border-box;
    }

    .checkbox-btn {
      width: 26px;
      height: 26px;
      background: #2a2a2a;
      border: 2px solid #aaa;
      border-radius: 4px;
      cursor: pointer;
      margin-right: 10px;
      position: relative;
      transition: background 0.2s, border-color 0.2s;
    }

    .checkbox-btn.checked {
      background-color: #1a73e8;
      border-color: #1a73e8;
    }

    .checkbox-btn.checked::after {
      content: "✓";
      color: white;
      font-size: 20px;
      font-weight: bold;
      position: absolute;
      top: -4px;
      left: 4px;

    @media (prefers-color-scheme: dark) {

    }

    @media (prefers-color-scheme: light) {

    /* 模态框中的转圈动画同样适配 */
    .modal .lds-ring div {

    /* 模态框背景浅色模式适配 */
    .modal-overlay {
      display: none;

      top: 0;
      left: 0;

      height: 100%;
      background: rgba(0, 0, 0, 0.7);
