    <title>浏览器内核版本检测 - 我的世界Edge的网站</title>
    <script type="text/javascript" src="https://www.index0.cn/core/js/core.js"></script>
    <style>
        /* ========== Material Design 3 核心变量定义（与主页完全一致） ========== */
        :root {
            --md-sys-color-primary: #2962FF;
            --md-sys-color-on-primary: #FFFFFF;
            --md-sys-color-primary-container: #DCE2FF;
            --md-sys-color-on-primary-container: #001A43;

            --md-sys-color-background: #F8FAFF;
            --md-sys-color-on-background: #1B1B1F;
            --md-sys-color-surface: #F8FAFF;
            --md-sys-color-on-surface: #1B1B1F;
            --md-sys-color-surface-variant: #E1E2EC;
            --md-sys-color-on-surface-variant: #45464F;

            --md-sys-color-outline: #757780;
            --md-sys-color-shadow: #000000;

            --md-sys-shape-corner-extra-large: 28px;
            --md-sys-shape-corner-large: 16px;
            --md-sys-shape-corner-medium: 12px;
            --md-sys-shape-corner-small: 8px;

            --md-sys-elevation-1: 0 1px 3px rgba(41, 98, 255, 0.12), 0 1px 2px rgba(41, 98, 255, 0.24);
            --md-sys-elevation-2: 0 3px 6px rgba(41, 98, 255, 0.15), 0 3px 6px rgba(41, 98, 255, 0.25);
            --md-sys-elevation-3: 0 10px 20px rgba(41, 98, 255, 0.15), 0 6px 6px rgba(41, 98, 255, 0.2);

            --md-sys-typescale-font-family: 'Roboto', 'Noto Sans SC', system-ui, -apple-system, sans-serif;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --md-sys-color-primary: #B1C5FF;
                --md-sys-color-on-primary: #002A71;
                --md-sys-color-primary-container: #00439F;
                --md-sys-color-on-primary-container: #DCE2FF;

                --md-sys-color-background: #11131A;
                --md-sys-color-on-background: #E2E2E6;
                --md-sys-color-surface: #11131A;
                --md-sys-color-on-surface: #E2E2E6;
                --md-sys-color-surface-variant: #45464F;
                --md-sys-color-on-surface-variant: #C5C6D0;

                --md-sys-color-outline: #8F9099;
                --md-sys-color-shadow: #000000;
            }
        }

        /* 强制浅色主题 */
        :root.light {
            --md-sys-color-primary: #2962FF;
            --md-sys-color-on-primary: #FFFFFF;
            --md-sys-color-primary-container: #DCE2FF;
            --md-sys-color-on-primary-container: #001A43;

            --md-sys-color-background: #F8FAFF;
            --md-sys-color-on-background: #1B1B1F;
            --md-sys-color-surface: #F8FAFF;
            --md-sys-color-on-surface: #1B1B1F;
            --md-sys-color-surface-variant: #E1E2EC;
            --md-sys-color-on-surface-variant: #45464F;

            --md-sys-color-shadow: #000000;

        :root.dark {
            --md-sys-color-primary: #B1C5FF;
            --md-sys-color-on-primary: #002A71;
            --md-sys-color-primary-container: #00439F;
            --md-sys-color-on-primary-container: #DCE2FF;

            --md-sys-color-on-background: #E2E2E6;
            --md-sys-color-surface: #11131A;

<body onload="whatBrowser(); detectOS();">

    <script>
        function detectOS() {
            const osDetailDiv = document.getElementById('osDetail');
            const userAgent = navigator.userAgent;
            const platform = navigator.platform;
            let osName = "未知";
            let osIcon = "🖥️";

            if (userAgent.indexOf("Windows NT") !== -1) {
                osName = "Windows";
                osIcon = "🪟";
            }
            else if (userAgent.indexOf("Mac OS X") !== -1) {
                const macVersion = userAgent.match(/Mac OS X (\d+[._]\d+[._]?\d*)/);
                if (macVersion) {
                    let ver = macVersion[1].replace(/_/g, '.');
                    const versionMap = {
                        "10.15": "Catalina",
                        "11.0": "Big Sur",
                        "12.0": "Monterey",
                        "13.0": "Ventura",
                        "14.0": "Sonoma",
                        "15.0": "Sequoia"
                    };
                    const majorVer = ver.split('.')[0] + '.' + ver.split('.')[1];
                    osName = `macOS ${versionMap[majorVer] || ver}`;
                } else {
                    osName = "macOS";
                }
                osIcon = "🍎";
            }
            else if (userAgent.indexOf("Linux") !== -1) {
                if (userAgent.indexOf("Android") !== -1) {
                    const androidVer = userAgent.match(/Android (\d+\.\d+)/);
                    osName = androidVer ? `Android ${androidVer[1]}` : "Android";
                    osIcon = "📱";
                } else {
                    osName = "Linux";
                    osIcon = "🐧";
                }
            }
            else if (userAgent.indexOf("iPhone") !== -1 || userAgent.indexOf("iPad") !== -1 || userAgent.indexOf("iPod") !== -1) {
                const iosVersion = userAgent.match(/OS (\d+[._]\d+)/);
                if (iosVersion) {
                    osName = `iOS ${iosVersion[1].replace(/_/g, '.')}`;
                } else {
                    osName = "iOS";
                }
                osIcon = "📱";
            }
            else if (userAgent.indexOf("CrOS") !== -1) {
                osName = "Chrome OS";
                osIcon = "📚";
            }
            else if (platform) {
                if (platform.indexOf("Win") !== -1) osName = "Windows";
                else if (platform.indexOf("Mac") !== -1) osName = "macOS";
                else if (platform.indexOf("Linux") !== -1) osName = "Linux";
                else osName = platform;
                if (osName === "Linux") osIcon = "🐧";
                else if (osName === "Windows") osIcon = "🪟";
                else if (osName === "macOS") osIcon = "🍎";
            }

            let osHTML = `<p><strong>操作系统：</strong> ${osIcon} ${osName}</p>`;
            osHTML += `<p><strong>平台标识：</strong> ${platform}</p>`;

            if (navigator.userAgentData && navigator.userAgentData.getHighEntropyValues) {
                navigator.userAgentData.getHighEntropyValues(["architecture", "bitness"]).then(values => {
                    if (values.architecture) {
                        const archText = values.bitness ? `${values.architecture} (${values.bitness}-bit)` : values.architecture;
                        osDetailDiv.innerHTML = osHTML + `<p><strong>系统架构：</strong> ${archText}</p>`;
                    } else {
                        osDetailDiv.innerHTML = osHTML;
                    }
                }).catch(() => {
                    osDetailDiv.innerHTML = osHTML;
                });
            } else {
                osDetailDiv.innerHTML = osHTML;
            }
        }
    </script>

    <script>
        function fixFirefoxDetection() {
            const versionDiv = document.getElementById('version');
            const suggestionDiv = document.getElementById('suggestion');
            if (!versionDiv || !suggestionDiv) return;

            const originalText = versionDiv.innerText;
            if (!originalText.includes('未能检测到极速内核版本号')) return;

            const ua = navigator.userAgent.toLowerCase();
            const isFirefox = ua.indexOf('firefox') > -1 && ua.indexOf('chrome') === -1;
            if (!isFirefox) return;

            let firefoxVersion = '';
            const match = ua.match(/firefox\/(\d+\.\d+)/);
            if (match) firefoxVersion = match[1];
            else firefoxVersion = '未知版本';

            let geckoVersion = '';
            const geckoMatch = ua.match(/gecko\/(\d+)/);
            if (geckoMatch) geckoVersion = geckoMatch[1];

            versionDiv.innerHTML = `版本号：<strong>Firefox ${firefoxVersion}</strong> (Gecko 内核)`;
            let suggestionHtml = `您的浏览器使用的是 <strong>Gecko</strong> 内核，这是 Firefox 浏览器。`;
            if (geckoVersion) suggestionHtml += `<br>Gecko 版本：${geckoVersion}`;
            suggestionHtml += `<br><br>Firefox 版本发布信息请参考 <a href="https://www.mozilla.org/firefox/releases/" target="_blank" rel="noopener noreferrer">Mozilla 官方发布说明</a>。`;
            suggestionDiv.innerHTML = suggestionHtml;
        }
        setTimeout(fixFirefoxDetection, 300);
    </script>

    <script>
        function openElectronDevTools() {
            try {
                if (window.require) {
                    // 【旧版特性 1】：针对真正老版本的 Electron (内置有 remote 模块)
                    try {
                        const electron = window.require('electron');
                        if (electron && electron.remote) {
                            electron.remote.getCurrentWindow().webContents.toggleDevTools();
                            showToast('已直接弹出开发者工具', 'success');
                            return;
                        }
                    } catch (e) {
                        console.log('原生 remote 降级...');
                    }

                    // 【旧版特性 2】：针对引入了外部远端库的架构 (@electron/remote)
                    try {
                        const remote = window.require('@electron/remote');
                        if (remote) {
                            remote.getCurrentWindow().webContents.toggleDevTools();
                            showToast('已通过 remote 弹出开发者工具', 'success');
                            return;
                        }
                    } catch (e) {
                        console.log('@electron/remote 降级...');
                    }

                    // 【旧版特性 3】：如果客户端禁用了前端直接控制，则采用安全进程通信向 main.js 发送信号
                    try {
                        const { ipcRenderer } = window.require('electron');
                        if (ipcRenderer) {
                            ipcRenderer.send('electron-toggle-devtools');
                            showToast('已向主进程发出打开请求', 'success');
                            return;
                        }
                    } catch (error) {
                        console.log('ipcRenderer 降级...');
                    }
                }
                // 在普通非 Electron 浏览器中点击，会弹出这行降级提示
                showToast('未检测到兼容的旧版 Node 环境', 'error');
            } catch (error) {
                console.error('无法唤起 DevTools:', error);
                showToast('唤起失败，请检查控制台', 'error');
            }
        }
    </script>

    <script>
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const toastIcon = document.getElementById('toast-icon');
            const toastMessage = document.getElementById('toast-message');
            
            toastMessage.textContent = message;
            toast.className = 'toast ' + type;
            toastIcon.textContent = type === 'success' ? '✓' : '✗';
            
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        function copyToClipboard(text, successMessage) {
            if (navigator.clipboard) {
                navigator.clipboard.writeText(text).then(() => {
                    showToast(successMessage, 'success');
                }).catch(err => {
                    console.error('复制失败:', err);
                    fallbackCopyTextToClipboard(text, successMessage);
                });
            } else {
                fallbackCopyTextToClipboard(text, successMessage);
            }
        }

        function fallbackCopyTextToClipboard(text, successMessage) {
            const textArea = document.createElement('textarea');
            textArea.value = text;
            textArea.style.position = 'fixed';
            textArea.style.left = '-999999px';
            textArea.style.top = '-999999px';
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            try {
                const successful = document.execCommand('copy');
                if (successful) {
                    showToast(successMessage, 'success');
                } else {
                    showToast('复制失败，请手动复制', 'error');
                }
            } catch (err) {
                console.error('传统复制方法失败:', err);
                showToast('复制失败，请手动复制', 'error');
            }
            document.body.removeChild(textArea);
        }

        function reportError() {
            copyToClipboard('1938400382@qq.com', '邮箱地址已复制，请粘贴到邮件客户端发送问题反馈');
        }

        function copyQQ() {
            copyToClipboard('1938400382', 'QQ号已复制');
        }

        function copyEmail() {
            copyToClipboard('1938400382@qq.com', '邮箱地址已复制');
        }
    </script>

    <script>
        (function() {
            const themeToggle = document.getElementById('themeToggle');
            let currentTheme = 'auto';

            function updateTheme() {
                const root = document.documentElement;
                root.classList.remove('light', 'dark');

                if (currentTheme === 'light') {
                    root.classList.add('light');
                    themeToggle.innerHTML = '☀️';
                    themeToggle.title = '浅色模式 - 点击切换到深色模式';
                } else if (currentTheme === 'dark') {
                    root.classList.add('dark');
                    themeToggle.innerHTML = '🌙';
                    themeToggle.title = '深色模式 - 点击切换到自动模式';
                } else {
                    const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                    themeToggle.innerHTML = '🌓';
                    themeToggle.title = '自动模式（跟随系统） - 点击切换到浅色模式';
                }
            }

            function toggleTheme() {
                if (currentTheme === 'auto') currentTheme = 'light';
                else if (currentTheme === 'light') currentTheme = 'dark';
                else currentTheme = 'auto';
                updateTheme();
            }

            themeToggle.addEventListener('click', toggleTheme);
            window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function() {
                if (currentTheme === 'auto') updateTheme();
            });
            currentTheme = 'auto';
            updateTheme();
        })();
    </script>
