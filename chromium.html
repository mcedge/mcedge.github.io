    <!-- 操作系统检测脚本 -->
    <script>
        function detectOS() {
            const osDetailDiv = document.getElementById('osDetail');
            const userAgent = navigator.userAgent;
            const platform = navigator.platform;
            let osName = "未知";
            let osIcon = "🖥️";

            if (userAgent.indexOf("Windows NT") !== -1) {
                osName = "Windows";
                osIcon = "🪟";
            }
            else if (userAgent.indexOf("Mac OS X") !== -1) {
                const macVersion = userAgent.match(/Mac OS X (\d+[._]\d+[._]?\d*)/);
                if (macVersion) {
                    let ver = macVersion[1].replace(/_/g, '.');
                    const versionMap = {
                        "10.15": "Catalina",
                        "11.0": "Big Sur",
                        "12.0": "Monterey",
                        "13.0": "Ventura",
                        "14.0": "Sonoma",
                        "15.0": "Sequoia"
                    };
                    const majorVer = ver.split('.')[0] + '.' + ver.split('.')[1];
                    osName = `macOS ${versionMap[majorVer] || ver}`;
                } else {
                    osName = "macOS";
                }
                osIcon = "🍎";
            }
            else if (userAgent.indexOf("Linux") !== -1) {
                if (userAgent.indexOf("Android") !== -1) {
                    const androidVer = userAgent.match(/Android (\d+\.\d+)/);
                    osName = androidVer ? `Android ${androidVer[1]}` : "Android";
                    osIcon = "📱";
                } else {
                    osName = "Linux";
                    osIcon = "🐧";
                }
            }
            else if (userAgent.indexOf("iPhone") !== -1 || userAgent.indexOf("iPad") !== -1 || userAgent.indexOf("iPod") !== -1) {
                const iosVersion = userAgent.match(/OS (\d+[._]\d+)/);
                if (iosVersion) {
                    osName = `iOS ${iosVersion[1].replace(/_/g, '.')}`;
                } else {
                    osName = "iOS";
                }
                osIcon = "📱";
            }
            else if (userAgent.indexOf("CrOS") !== -1) {
                osName = "Chrome OS";
                osIcon = "📚";
            }
            else if (platform) {
                if (platform.indexOf("Win") !== -1) osName = "Windows";
                else if (platform.indexOf("Mac") !== -1) osName = "macOS";
                else if (platform.indexOf("Linux") !== -1) osName = "Linux";
                else osName = platform;
                if (osName === "Linux") osIcon = "🐧";
                else if (osName === "Windows") osIcon = "🪟";
                else if (osName === "macOS") osIcon = "🍎";
            }

            let osHTML = `<p><strong>操作系统：</strong> ${osIcon} ${osName}</p>`;
            osHTML += `<p><strong>平台标识：</strong> ${platform}</p>`;

            if (navigator.userAgentData && navigator.userAgentData.getHighEntropyValues) {
                navigator.userAgentData.getHighEntropyValues(["architecture", "bitness"]).then(values => {
                    if (values.architecture) {
                        const archText = values.bitness ? `${values.architecture} (${values.bitness}-bit)` : values.architecture;
                        osDetailDiv.innerHTML = osHTML + `<p><strong>系统架构：</strong> ${archText}</p>`;
                    } else {
                        osDetailDiv.innerHTML = osHTML;
                    }
                }).catch(() => {
                    osDetailDiv.innerHTML = osHTML;
                });
            } else {
                osDetailDiv.innerHTML = osHTML;
            }
        }
    </script>

    <!-- Toast & 复制功能脚本 -->
    <script>
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            const toastIcon = document.getElementById('toast-icon');
            const toastMessage = document.getElementById('toast-message');
            
            toastMessage.textContent = message;
            toast.className = 'toast ' + type;
            toastIcon.textContent = type === 'success' ? '✓' : '✗';
            
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        function copyToClipboard(text, successMessage) {
            if (navigator.clipboard) {
                navigator.clipboard.writeText(text).then(() => {
                    showToast(successMessage, 'success');
                }).catch(err => {
                    console.error('复制失败:', err);
                    fallbackCopyTextToClipboard(text, successMessage);
                });
            } else {
                fallbackCopyTextToClipboard(text, successMessage);
            }
        }

        function fallbackCopyTextToClipboard(text, successMessage) {
            const textArea = document.createElement('textarea');
            textArea.value = text;
            textArea.style.position = 'fixed';
            textArea.style.left = '-999999px';
            textArea.style.top = '-999999px';
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            try {
                const successful = document.execCommand('copy');
                if (successful) {
                    showToast(successMessage, 'success');
                } else {
                    showToast('复制失败，请手动复制', 'error');
                }
            } catch (err) {
                console.error('传统复制方法失败:', err);
                showToast('复制失败，请手动复制', 'error');
            }
            document.body.removeChild(textArea);
        }

        function reportError() {
            copyToClipboard('1938400382@qq.com', '邮箱地址已复制，请粘贴到邮件客户端发送问题反馈');
        }

        function copyQQ() {
            copyToClipboard('1938400382', 'QQ号已复制');
        }

        function copyEmail() {
            copyToClipboard('1938400382@qq.com', '邮箱地址已复制');
        }
    </script>

    <!-- 主题切换功能 -->
    <script>
        (function() {
            const themeToggle = document.getElementById('themeToggle');
            let currentTheme = 'auto';

            function updateTheme() {
                const root = document.documentElement;
                root.classList.remove('light', 'dark');

                if (currentTheme === 'light') {
                    root.classList.add('light');
                    themeToggle.innerHTML = '☀️';
                    themeToggle.title = '浅色模式 - 点击切换到深色模式';
                } else if (currentTheme === 'dark') {
                    root.classList.add('dark');
                    themeToggle.innerHTML = '🌙';
                    themeToggle.title = '深色模式 - 点击切换到自动模式';
                } else {
                    const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                    themeToggle.innerHTML = '🌓';
                    themeToggle.title = '自动模式（跟随系统） - 点击切换到浅色模式';
                }
            }

            function toggleTheme() {
                if (currentTheme === 'auto') currentTheme = 'light';
                else if (currentTheme === 'light') currentTheme = 'dark';
                else currentTheme = 'auto';
                updateTheme();
            }

            themeToggle.addEventListener('click', toggleTheme);
            window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function() {
                if (currentTheme === 'auto') updateTheme();
            });
            currentTheme = 'auto';
            updateTheme();
        })();
    </script>
</body>
</html>
